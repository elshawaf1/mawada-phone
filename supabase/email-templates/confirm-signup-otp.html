<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تأكيد الحساب</title>
</head>
<body style="margin:0;padding:0;background-color:#F7F8FA;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#F7F8FA;padding:40px 20px;">
    <tr>
      <td align="center">
        <table width="600" cellpadding="0" cellspacing="0" style="background-color:#FFFFFF;border-radius:16px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.06);">

          <!-- Header -->
          <tr>
            <td style="background-color:#0F172A;padding:32px 40px;text-align:center;">
              <h1 style="margin:0;color:#FFFFFF;font-size:22px;font-weight:700;">مودة فون</h1>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="padding:40px;">
              <h2 style="margin:0 0 16px;color:#0F172A;font-size:20px;font-weight:700;text-align:center;">
                تأكيد الحساب
              </h2>
              <p style="margin:0 0 24px;color:#64748B;font-size:15px;line-height:24px;text-align:center;">
                مرحباً بك في مودة فون! استخدم الرمز أدناه لتأكيد حسابك.
              </p>

              <!-- OTP Code -->
              <table width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td align="center" style="padding:0 0 32px;">
                    <div style="background-color:#F1F5F9;border-radius:16px;padding:24px 40px;display:inline-block;">
                      <span style="font-size:36px;font-weight:900;color:#0F172A;letter-spacing:12px;font-family:monospace;">
                        {{ .Token }}
                      </span>
                    </div>
                  </td>
                </tr>
              </table>

              <p style="margin:0 0 8px;color:#94A3B8;font-size:13px;line-height:20px;text-align:center;">
                هذا الرمز صالح لمدة 5 دقائق فقط
              </p>

              <!-- Divider -->
              <hr style="border:none;border-top:1px solid #E8ECF1;margin:24px 0;" />

              <p style="margin:0;color:#94A3B8;font-size:12px;line-height:18px;text-align:center;">
                إذا لم تطلب إنشاء حساب، يمكنك تجاهل هذا البريد الإلكتروني بأمان. لن يتم تغيير حسابك.
              </p>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="background-color:#F7F8FA;padding:24px 40px;text-align:center;">
              <p style="margin:0;color:#94A3B8;font-size:12px;">
                © 2026 مودة فون. جميع الحقوق محفوظة.
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>

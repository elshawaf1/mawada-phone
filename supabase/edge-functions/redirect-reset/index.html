<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>إعادة تعيين كلمة المرور - مودة فون</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #F7F8FA; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .card { background: #FFF; border-radius: 16px; padding: 40px; max-width: 400px; width: 90%; text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
    h1 { font-size: 22px; color: #0F172A; margin-bottom: 16px; }
    p { font-size: 14px; color: #64748B; line-height: 22px; margin-bottom: 24px; }
    .btn { display: inline-block; background: #0F172A; color: #FFF; font-size: 16px; font-weight: 700; text-decoration: none; padding: 14px 48px; border-radius: 12px; }
    .btn:active { opacity: 0.8; }
    .loading { color: #94A3B8; font-size: 13px; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>مودة فون</h1>
    <p>إعادة تعيين كلمة المرور</p>
    <div id="content">
      <a id="openApp" class="btn" href="#">فتح التطبيق</a>
      <p class="loading">جاري فتح التطبيق...</p>
    </div>
  </div>

  <script>
    (function() {
      var url = window.location.href;
      var hash = url.split('#')[1] || '';
      var query = url.split('?')[1] || '';
      var params = new URLSearchParams(hash || query);
      var accessToken = params.get('access_token');
      var refreshToken = params.get('refresh_token');

      if (accessToken && refreshToken) {
        var deepLink = 'mawada://reset-password#access_token=' + accessToken + '&refresh_token=' + refreshToken;
        var appLink = document.getElementById('openApp');
        appLink.href = deepLink;
        window.location.href = deepLink;

        setTimeout(function() {
          window.location.href = 'mawada://reset-password#access_token=' + accessToken + '&refresh_token=' + refreshToken;
        }, 500);

        setTimeout(function() {
          document.getElementById('content').innerHTML = '<p style="color:#94A3B8;font-size:13px;">لم يفتح التطبيق؟ تأكد من تثبيت التطبيق ثم <a href="' + deepLink + '" style="color:#3B82F6;">اضغط هنا</a></p>';
        }, 3000);
      } else {
        document.getElementById('content').innerHTML = '<p style="color:#E63946;font-size:13px;">رابط إعادة التعيين غير صالح أو منتهي الصلاحية.<br/>يرجى طلب رابط جديد.</p>';
      }
    })();
  </script>
</body>
</html>
